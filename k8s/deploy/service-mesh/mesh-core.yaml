apiVersion: v1
kind: Namespace
metadata:
  name: yas
  labels:
    istio-injection: enabled
---
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: default
  namespace: yas
spec:
  mtls:
    mode: STRICT
---
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: backoffice-bff-mtls
  namespace: yas
spec:
  host: backoffice-bff.yas.svc.cluster.local
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL
---
