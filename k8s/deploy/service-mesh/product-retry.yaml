apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: product-retry
  namespace: yas
spec:
  hosts:
    - product
    - product.yas.svc.cluster.local
  http:
    - match:
        - uri:
            prefix: /product
      retries:
        attempts: 3
        perTryTimeout: 2s
        retryOn: 5xx,connect-failure,refused-stream,gateway-error,reset
      route:
        - destination:
            host: product.yas.svc.cluster.local
            port:
              number: 80
